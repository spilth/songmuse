- title: The Forgotten Beats
  description: Write a melody that starts on beat 2 or 3. Most melodies start on the first beat of the measure, but starting on beat 2 or 3 can create a neat sense of anticipation or surprise.
- title: A Minor Challenge
  description: Compose a piece in a minor key. It doesn’t have to be any more complicated than writing a piece in a Major key, and you should be comfortable with both.
- title: Compounding the Problem
  description: Use a Compound Meter (time signature) - like 5/4, 9/8, or 12/8. You don’t hear these very often, but they can bring a strong sense of rhythm to your writing and force you to come up with new rhythmic ideas. See for an explanation of Compound Meters.
- title: A Pirate’s Life for Me
  description: Compose a Piratey-sounding jig. Everyone loves a good jig.
- title: Game Over
  description: Create an awesome ‘Game Over’ theme that’s less than 10 seconds in length. Any longer would just be rubbing it in.
- title: The Julie Andrews
  description: Use a human voice to sing the melody of at least an entire section (not necessarily an entire track). No lyrics required - ‘Oohs’ and ‘Ahs’ can be very effective!
- title: Kickin’ it Old School
  description: Make a chiptune track! Remember your roots and bring back some of that 8-bit flavor.
- title: Something Borrowed
  description: Use at least one Borrowed Chord in one of your compositions. Borrowed chords give you new and exciting options for harmonizing your melodies. See the analysis of Final Fantasy VII’s main theme at vgmacademy.com/ff7 for an explanation.
- title: If It Ain’t Got That Swing
  description: Write a piece that uses a swung beat. Dancing along encouraged, but not required.
- title: Something Strange & Wonderful
  description: Write a melody using an instrument you’ve never used before whose name you aren’t even 100% sure how to pronounce. Did you know there’s an instrument called a “Crwth?” Those 11th-century Welsh musicians really knew how to rock. Good look finding a sample library with THAT included.
- title: Music Box
  description: Compose a piece for a music box, which may also be called a “lamellophone,” “linguaphone,” or “thumb piano,” in sample libraries. Most multi-voice keyboards have an onboard music-box-sounding instrument.
- title: Make it Modulate
  description: Change keys in the middle of a composition, using any form of modulation you’d like. If the piece is meant to loop, don’t forget that you’ll have to modulate back to the original key!
- title: Drum Machine
  description: Write an entire piece using ONLY unpitched percussion instruments (that means no xylophones, pianos, etc).
- title: Nap Time
  description: "Write a very short (less than 10 seconds) JRPG-style music cue for sleeping at an inn. A Little Help From My Friends: Feature one of your friends on a new composition. Their partcan be as small or large as you’d like! Guest spoons solo, anyone?"
- title: Doom Carnival
  description: It’s night time at a broken down, creepy carnival and you’re exploring alone. Every bump in the night could be a killer clown or animatronic fiend ready to pounce. Write that music.
- title: If it Ain’t Baroque
  description: Write a period piece in the Baroque style. Check out Wikipedia for guidelines on style and musical instruments of the time.
- title: The Name Game
  description: "Write out your FULL name, and remove any letters that aren’t a part of the musical alphabet (ABCDEFG). Write a piece using a motif or melody based on that sequence of letters. Use any rhythm you’d like, but maintain the order of the letters! (Example: Franklin Delano Roosevelt would become F A D E A E E)"
- title: Attack of the Drones
  description: Create a new piece of music that uses the same drone pitch throughout the entire piece.
- title: Something Blue
  description: Write a piece based on the blues scale! You cool cat, you.
- title: Silence is Golden
  description: Write a new piece, or change an existing piece, to contain 2-4 concurrent beatsof silence.
- title: The Flip Side
  description: Take a melody that you’ve written and invert it, reversing the direction of all intervals. Write a new piece based on this inversion.
- title: Pizz Off
  description: Write an entire piece for strings, using the pizzicato technique for every instrument throughout the entire piece. No bowing or sustained notes!
- title: Big Baddie
  description: A gigantic, overwhelmingly-powerful, evil, destructive monstrosity is lumbering towards you. Write a track that communicates the sheer power and size of such a horrible beastie.